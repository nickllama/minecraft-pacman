<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Minecraft PacMan - Steve vs Zombies</title>
<script>window.__v = Date.now();</script>
<link rel="stylesheet" id="css-link">
</head>
<body>
<div id="game-container">
  <div id="hud">
    <div class="hud-item">SCORE: <span id="score">0</span></div>
    <div class="hud-item">LEVEL: <span id="level">1</span></div>
    <div class="hud-item" id="lives-container">LIVES: <span id="lives"></span></div>
  </div>
  <div id="game-wrap"><canvas id="game"></canvas></div>
  <div id="overlay" class="hidden">
    <div id="overlay-text">GAME OVER</div>
    <button id="restart-btn">PLAY AGAIN</button>
  </div>
  <div id="start-screen">
    <h1>STEVE vs ZOMBIES</h1>
    <p>Collect carrots. Avoid zombies. Eat golden apples to hunt them!</p>
    <p class="controls-hint">Arrows / WASD on desktop · Swipe or D-pad on mobile</p>
    <button id="start-btn">START</button>
  </div>
  <div id="dpad">
    <button class="dp-btn" data-dir="up">▲</button>
    <button class="dp-btn" data-dir="left">◀</button>
    <button class="dp-btn" data-dir="right">▶</button>
    <button class="dp-btn" data-dir="down">▼</button>
  </div>
</div>
<script>
  document.getElementById("css-link").href = "style.css?v=" + window.__v;
  var s = document.createElement("script");
  s.src = "game.js?v=" + window.__v;
  document.body.appendChild(s);
</script>
</body>
</html>
